site_name: EntraScout Docs
site_description: External + internal Microsoft 365 / Entra ID / Azure red-team reconnaissance
site_author: Osher Assor, Nir Halfon
site_url: https://entrascout.readthedocs.io
repo_url: https://github.com/assor17/entrascout
repo_name: assor17/entrascout
copyright: Copyright &copy; 2025 EntraScout Contributors

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - CLI Reference: cli-reference.md
  - Phases: phases.md
  - Web App: web-app.md
  - API Reference: api.md
  - Architecture: architecture.md
  - Attack Chains: attack-chains.md
  - Recipes: recipes.md
  - Deployment: deployment.md
  - Contributing: contributing.md
